name: Deploy to AWS Fargate

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: my-react-app
  ECS_CLUSTER: my-react-cluster
  TASK_DEFINITION: my-react-app
  CONTAINER_NAME: my-react-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update task definition with new image
        id: task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_DEFINITION --query "taskDefinition")
          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if c['name'] == '${{ env.CONTAINER_NAME }}':
                  c['image'] = '${{ steps.build-image.outputs.image }}'
          keys = ['family','networkMode','requiresCompatibilities','cpu','memory','executionRoleArn','containerDefinitions']
          print(json.dumps({k: td[k] for k in keys if k in td}))
          ")
          NEW_REVISION=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query "taskDefinition.taskDefinitionArn" --output text)
          echo "task_def_arn=$NEW_REVISION" >> $GITHUB_OUTPUT

      - name: Stop existing Fargate tasks
        run: |
          TASKS=$(aws ecs list-tasks --cluster $ECS_CLUSTER --query "taskArns" --output text)
          for TASK in $TASKS; do
            aws ecs stop-task --cluster $ECS_CLUSTER --task $TASK
          done

      - name: Run new Fargate task
        run: |
          aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition ${{ steps.task-def.outputs.task_def_arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-035ce7cd0ce1fd84e],securityGroups=[sg-0651f604ad0907f45],assignPublicIp=ENABLED}"